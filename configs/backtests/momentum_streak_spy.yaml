run_name: momentum_streak_spy
strategy: momentum_streak
strategy_params:
  entry_streak: 3
  exit_streak: 2
  vol_lookback: 20
  vol_mult: 1.0
  size: 1.0
data:
  symbols: ["SPY"]
  timeframe: "1d"
  start: "2015-01-02"
  end: "2024-12-31"
  source: "csv"
  root: "data/raw"
execution:
  initial_cash: 100000
  commission_bps: 2
  slippage_bps: 5
  allow_fractional: false
  allow_short: true
portfolio:
  sizing_mode: "percent_equity"
  size: 0.95
output_root: "output/runs"
