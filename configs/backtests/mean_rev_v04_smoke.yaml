run_name: mean_rev_v04_smoke
strategy: mean_reversion_atr
universe_path: ../universe_smoke.yaml
data:
  source: csv
  root: data/raw
  start: '2024-01-02'
  end: '2024-12-31'
  timeframe: 1d
  auto_adjust: true
  aux_symbols: [SPY, '^VIX']
strategy_params:
  entry_atr_mult: 1.25
  mean_lookback: 10
  atr_lookback: 20
  time_stop_days: 7
  runner_time_stop_days: 12
  runner_ceiling_atr_mult: 1.25
  runtime_trend_threshold: 0.0025
execution:
  initial_cash: 100000
  commission_bps: 2
  slippage_bps: 5
  allow_fractional: false
  allow_short: false
  hard_stop_atr_mult: 1.75
  runner_atr_mult: 2.5
  breakeven_floor: true
  tranche_stop_atr_period: 20
portfolio:
  sizing_mode: vol_targeted
  vol_target: 0.12
  position_cap_pct: 0.10
  cash_reserve_pct: 0.30
  risk_budget_pct: 0.06
  sector_cap_pct: 0.50
regimes:
  spy_ema:
    enabled: true
    ema_lookback: 200
    trip_pct: -0.02
    resume_pct: 0.02
  vix:
    enabled: true
    trip_threshold: 30
    trip_consec: 2
    resume_threshold: 25
    resume_consec: 3
  circuit_breaker:
    enabled: true
    pnl_window_days: 20
    trip_pct: -0.05
    pause_days: 10
output_root: output/runs
