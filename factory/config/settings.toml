node_id = "local"   # per-machine; override in settings.local.toml (e.g. "desk", "vps1")

[paths]
backtester_root  = "."
strategies_dir   = "strategies"
configs_dir      = "configs/wfo"
registry_file    = "backtester/strategies/registry.py"
output_runs_dir  = "output/runs"
dedup_log        = "factory/data/dedup_log.txt"
results_dir      = "factory/data/results"
factory_log      = "factory/logs/factory.log"
tmp_dir          = "factory/data/_tmp"

[generation]
claude_cmd             = "claude"
claude_flags           = ["-p", "--output-format", "json", "--allowedTools", "Read"]
generation_timeout_sec = 3000

[stages]
stage_timeout_sec = 5400

[alerts]
alert_threshold_metric = "wfo.oos_sharpe"
alert_threshold        = 1.0
telegram_bot_token     = ""       # real value goes in config/settings.local.toml (gitignored)
telegram_chat_id       = ""       # real value goes in config/settings.local.toml (gitignored)
dashboard_base_url     = "http://127.0.0.1:8787"

[loop]
mode                  = "continuous"
inter_cycle_sleep_sec = 5
max_cycles            = 0   # 0 = unlimited

[dashboard]
host             = "127.0.0.1"
port             = 8787
auto_refresh_sec = 10

[promotion]
enabled           = true
tickers           = ["AAPL", "QQQ", "DIA"]
data_source       = "yfinance"        # csv if all tickers in data/raw/; yfinance fetches on first run
min_avg_sharpe    = 0.7
trigger_metric    = "wfo.oos_sharpe"
trigger_threshold = 1.0

[screening]
enabled            = true
min_optimize_score = 1.3

[sync]
enabled      = false          # master switch for distributed multi-machine sync
branch       = "factory-pool" # shared pool branch
remote       = "origin"
push_retries = 5
